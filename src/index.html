<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClaudePlot 圖表圖鑑 · Chart Codex</title>
  <meta name="description" content="依 Claude 知識整理的常見到進階圖表圖鑑，每張含中文／英文名稱與適用場景。">
  <link rel="stylesheet" href="css/style.css">
  <script>
    /* 初始主題：優先讀 localStorage，其次跟隨系統偏好，避免載入閃爍 */
    (function () {
      try {
        var saved = localStorage.getItem('cp-theme');
        var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) { /* 忽略 */ }
    })();
  </script>
</head>
<body>
  <div class="page">
    <header class="site-header">
      <div class="header-inner">
        <div class="brand">
          <h1>ClaudePlot 圖表圖鑑</h1>
          <p class="tagline">Chart Codex — 依 Claude 知識整理的常用圖表，含中英名稱與適用場景</p>
        </div>
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="切換明暗主題">🌙</button>
      </div>

      <div class="controls">
        <input id="search" class="search" type="search" placeholder="搜尋圖表名稱、英文或適用場景…" autocomplete="off">
        <div id="filters" class="filters" role="tablist" aria-label="圖表分類"></div>
      </div>
    </header>

    <main class="main">
      <div id="grid" class="grid" aria-live="polite"></div>
      <p id="empty" class="empty" hidden>找不到符合條件的圖表。</p>
    </main>

    <footer class="site-footer">
      <span>ClaudePlot · 以 Apache ECharts 呈現 · nginx 靜態站台</span>
    </footer>
  </div>

  <!-- 圖表詳情彈窗 -->
  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="mTitleZh">
      <button class="modal-close" type="button" data-close aria-label="關閉">×</button>
      <div class="modal-head">
        <span id="mNum" class="card-num"></span>
        <span id="mCat" class="tag"></span>
      </div>
      <h2 id="mTitleZh" class="modal-title-zh"></h2>
      <p id="mTitleEn" class="modal-title-en"></p>
      <div id="mChart" class="modal-chart"></div>
      <div class="modal-meta">
        <section>
          <h3>適用場景</h3>
          <p id="mScenario"></p>
        </section>
        <section>
          <h3>使用提示</h3>
          <p id="mTips"></p>
        </section>
      </div>
    </div>
  </div>

  <script src="vendor/echarts.min.js"></script>
  <script src="js/catalog.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
