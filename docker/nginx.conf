# ClaudePlot 站台設定
#
# 官方 nginx 映像檔預設將 /var/log/nginx/{access,error}.log 軟連結到 stdout/stderr；
# 當 docker-compose 以 bind mount 掛載 ./logs 到 /var/log/nginx 時，
# 軟連結會被覆蓋，nginx 便會將 log 寫成實體檔，達成 log 持久化。
server {
    listen      80;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log warn;

    # 壓縮文字類資源
    gzip              on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;

    # 一般靜態資源
    location / {
        try_files $uri $uri/ =404;
    }

    # 第三方資源（ECharts、world.json）長快取
    location /vendor/ {
        expires    7d;
        add_header Cache-Control "public";
    }
}
